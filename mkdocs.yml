site_name: SmogNet

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: light blue

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - API Reference: api.md
  - UI Reference: ui.md